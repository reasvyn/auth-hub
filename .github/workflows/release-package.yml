name: Publish Package

on:
  workflow_dispatch:
    inputs:
      workspace:
        description: Workspace package name to publish (for example @reasvyn/auth-core)
        required: true
        type: string
      tag:
        description: npm dist-tag
        required: false
        default: latest
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Run tests
        run: npm run test

      - name: Publish selected workspace
        run: npm publish --workspace "${{ inputs.workspace }}" --tag "${{ inputs.tag }}" --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
